<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>任务完成</title>
  <style>
    html{min-height:100%;}
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(180deg, #eef4ff, #dbeafe);
      font-family: "Segoe UI", system-ui, Arial, sans-serif;
      color: #0f172a;
    }
    .card {
      width: min(100%, 420px);
      padding: 32px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
      text-align: center;
    }
    .title {
      margin: 0 0 16px;
      font-size: 1.2rem;
      font-weight: 800;
    }
    .subtitle {
      margin: 0 0 28px;
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .code-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 140px;
      padding: 24px;
      border-radius: 22px;
      background: linear-gradient(135deg, #60a5fa, #3b82f6);
      color: #fff;
      font-size: 3rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      box-shadow: 0 16px 36px rgba(59, 130, 246, 0.2);
      user-select: all;
      word-break: break-all;
      cursor: text;
    }
    .hint {
      margin-top: 22px;
      color: #475569;
      font-size: 0.95rem;
    }
    .home-btn {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 18px;
      border-radius: 16px;
      background: #3b82f6;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
      transition: transform .18s ease, filter .18s ease;
    }
    .home-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }
    @media (max-width: 420px) {
      .card {padding: 24px;}
      .title {font-size: 1.1rem;}
      .subtitle {font-size: 0.94rem;}
      .code-box {font-size: 2.4rem; padding: 20px;}
      .hint {font-size: 0.9rem;}
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="title">任务完成</h1>
    <p class="subtitle">以下为固定 6 位数，直接复制即可使用。</p>
    <div class="code-box">593849</div>
    <p class="hint">长按或拖动数字即可复制。</p>
    <a class="home-btn" href="/home.html">返回主页</a>
  </div>
</body>
</html>
