<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商城主页</title>
<style>
  *{box-sizing:border-box;font-family:Arial}
  body{margin:0;padding:20px;background:#f5f7fa}
  .top{background:white;padding:15px;border-radius:12px;margin-bottom:15px;display:flex;justify-content:space-between}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .card{background:white;border-radius:12px;padding:10px;text-align:center}
  .card img{width:100%;height:auto;border-radius:8px}
  .name{font-weight:bold;margin:6px 0}
  .price{color:#ff8800;margin:4px 0}
  button{width:100%;padding:8px;border:none;border-radius:6px;background:#007aff;color:white;margin-top:4px}
  .btn-bought{background:#06c000}
  .modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center}
  .modal-box{background:white;width:90%;max-width:380px;border-radius:12px;overflow:hidden}
  .modal-header{padding:14px;text-align:right}
  .close{font-size:18px;cursor:pointer}
  .modal-body{padding:0 20px 20px;text-align:center}
  .link{padding:10px;background:#f0f0f0;border-radius:8px;word-break:break-all}
</style>
</head>

<body>
<div class="top">
  <div>用户：<span id="user">-</span></div>
  <div>金币：🪙<span id="coins">0</span></div>
  <button onclick="location.href='/index.html'">退出</button>
</div>

<button onclick="signIn()" style="background:#ff8800;margin-bottom:12px">每日签到</button>

<div class="grid" id="items"></div>

<!-- 链接弹窗 -->
<div class="modal" id="linkModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <h3>商品链接</h3>
      <div id="linkText" class="link"></div>
    </div>
  </div>
</div>

<script>
  const user = localStorage.getItem("loginUser");
  if (!user) location.href = "/index.html";

  let userCoins = 0;
  let boughtItems = [];

  window.onload = loadAll;

  async function loadAll() {
    document.getElementById("user").innerText = user;
    const u = await fetch("/api/userinfo", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user })
    });
    const d = await u.json();
    if (d.ok) {
      userCoins = d.user.coins;
      boughtItems = d.bought;
      document.getElementById("coins").innerText = userCoins;
    }
    loadItems();
  }

  async function loadItems() {
    const r = await fetch("/api/items");
    const data = await r.json();
    const dom = document.getElementById("items");
    data.items.forEach(it => {
      const isBought = boughtItems.includes(it.id);
      dom.innerHTML += `
        <div class="card">
          <img src="${it.image}">
          <div class="name">${it.name}</div>
          <div class="price">${it.price} 金币</div>
          ${isBought 
            ? `<button class="btn-bought" onclick="showLink(${it.id})">查看链接</button>`
            : `<button onclick="buy(${it.id},${it.price})">立即购买</button>`
          }
        </div>
      `;
    });
  }

  async function buy(itemId, price) {
    if (userCoins < price) return alert("金币不足");
    const r = await fetch("/api/buy", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, item_id: itemId })
    });
    const d = await r.json();
    alert(d.msg);
    if (d.ok) location.reload();
  }

  async function showLink(itemId) {
    const r = await fetch("/api/items");
    const data = await r.json();
    const item = data.items.find(i => i.id == itemId);
    document.getElementById("linkText").innerText = item.link;
    document.getElementById("linkModal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("linkModal").style.display = "none";
  }

  async function signIn() {
    const r = await fetch("/api/sign", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user })
    });
    const d = await r.json();
    alert(d.msg);
    if (d.ok) location.reload();
  }
</script>
</body>
</html>
