<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商城主页</title>
<style>
  :root{
    --bg:#eef4ff;
    --surface:#ffffff;
    --primary:#3b82f6;
    --accent:#ff5874;
    --text:#0f172a;
    --muted:#64748b;
    --radius:22px;
    --shadow:0 24px 60px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:linear-gradient(180deg,#f7fbff,#eef4ff);color:var(--text);font-family:"Segoe UI",system-ui,Arial,sans-serif;min-height:100vh;}
  .container{max-width:500px;margin:0 auto;padding:20px 16px 24px;}
  .top{background:var(--surface);padding:18px 16px;border-radius:26px;margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:flex-start;gap:10px;box-shadow:var(--shadow);}
  .top .user-name{font-size:0.95rem;font-weight:700;word-break:break-word;flex:1 1 100%;}
  .top .user-note{font-size:0.85rem;color:#2563eb;flex:1 1 100%;line-height:1.4;}
  .top button{flex:0 1 auto;min-width:110px;border:none;background:#e2e8f0;color:var(--text);padding:10px 12px;border-radius:14px;font-weight:700;font-size:0.88rem;cursor:pointer;white-space:nowrap;}
  .top button#topActionButton{min-width:110px;}
  .top .small-btn{flex:0 1 auto;padding:8px 12px;font-size:0.86rem;}
  .top-right{position:sticky;top:14px;display:flex;flex-wrap:wrap;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:16px;z-index:10;}
  .coin-box{background:linear-gradient(135deg,#ffd700,#ff9500);color:#fff;padding:10px 14px;border-radius:999px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:0 12px 28px rgba(255,149,0,.18);}
  .donate-btn{background:linear-gradient(135deg,#ff6699,#ff3366);color:#fff;border:none;padding:10px 16px;border-radius:999px;font-weight:700;cursor:pointer;box-shadow:0 12px 24px rgba(255,51,102,.18);}
  .sign-btn{width:auto;padding:8px 12px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff8f00,#ff6a00);color:#fff;font-weight:700;font-size:0.82rem;cursor:pointer;}
  .search-box{background:var(--surface);padding:14px 16px;border-radius:18px;margin-bottom:16px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;box-shadow:var(--shadow);}
  .search-input{flex:1 1 220px;min-width:0;padding:10px 14px;border:1px solid #e2e8f0;border-radius:14px;font-size:0.95rem;color:var(--text);font-family:inherit;}
  .search-input::placeholder{color:#94a3b8;}
  .search-btn{width:auto;padding:10px 14px;border:none;border-radius:14px;background:#3b82f6;color:#fff;font-weight:700;font-size:0.88rem;cursor:pointer;white-space:nowrap;}
  .search-btn:hover{background:#2563eb;}
  .clear-btn{width:auto;padding:10px 12px;border:none;border-radius:14px;background:#e2e8f0;color:var(--text);font-weight:700;font-size:0.88rem;cursor:pointer;white-space:nowrap;}
  .tasks-section{background:var(--surface);padding:18px 16px;border-radius:22px;margin-bottom:16px;box-shadow:var(--shadow);}
  .section-title{font-size:1rem;font-weight:800;margin-bottom:14px;}
  .task-list{display:grid;gap:12px;}
  .task-card{border:1px solid #e2e8f0;border-radius:18px;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fff;}
  .task-card h4{margin:0;font-size:0.95rem;color:#0f172a;}
  .task-desc{color:#64748b;font-size:0.92rem;line-height:1.5;}
  .task-action{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;}
  .task-reward{font-weight:700;color:#f97316;}
  .task-btn{flex:1;padding:10px 12px;border:none;border-radius:14px;background:#3b82f6;color:#fff;font-weight:700;font-size:0.9rem;cursor:pointer;}
  .task-btn:disabled{background:#cbd5e1;cursor:not-allowed;}
  .no-tasks{color:#64748b;font-size:0.95rem;text-align:center;padding:16px 0;}
  .task-box{background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;padding:8px 12px;border-radius:999px;font-weight:700;display:flex;align-items:center;gap:8px;border:none;cursor:pointer;font-size:0.95rem;min-width:0;}
  .task-box .task-label{display:inline-block}
  .task-box.active{box-shadow:0 10px 28px rgba(59,130,246,.18)}
  .tasks-panel{position:fixed;top:0;right:0;height:100%;width:100%;max-width:420px;background:var(--surface);box-shadow: -20px 0 40px rgba(15,23,42,.08);transform:translateX(110%);transition:transform .32s ease;z-index:99999;padding:22px 18px;border-radius:0 0 0 0;display:flex;flex-direction:column;}
  .tasks-panel.open{transform:translateX(0);} 
  .tasks-panel .panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #e2e8f0;margin-bottom:12px;}
  .tasks-panel .panel-header h3{margin:0;font-size:1.05rem;flex:1;}
  .tasks-panel .panel-close{background:none;border:none;font-size:20px;cursor:pointer;color:#64748b;padding:6px;display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:8px;transition:all .2s ease;}
  .tasks-panel .panel-close:hover{background:#f1f5f9;color:#0f172a;}
  .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
  @media (max-width: 860px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));}}
  @media (max-width: 660px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
  @media (max-width: 520px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
  @media (max-width: 380px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
  .card{background:var(--surface);border-radius:24px;padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:var(--shadow);min-height:240px;position:relative;overflow:hidden;}
  .image-wrapper{position:relative;width:100%;}
  .card img{width:100%;aspect-ratio:1 / 1;border-radius:16px;object-fit:cover;display:block;}
  .label-badges{position:absolute;top:0px;left:0px;display:flex;flex-wrap:wrap;gap:6px;z-index:2;}
  .label-badge{background:rgba(0,0,0,.25);color:#fff;padding:4px 8px;border-radius:999px;font-size:0.72rem;font-weight:700;}
  .item-meta{color:#64748b;font-size:0.82rem;line-height:1.4;margin:6px 0 0;display:flex;gap:8px;justify-content:center;flex-wrap:nowrap;white-space:nowrap;}
  .item-meta span{background:rgba(59,130,246,.08);padding:6px 10px;border-radius:999px;}
  .name{font-weight:800;margin:8px 0 4px;font-size:0.92rem;line-height:1.4;min-height:2.5em;text-align:center;}
  .price{color:#fb923c;margin:0 0 10px;font-size:0.88rem;}
  button{width:auto;padding:10px 0;border:none;border-radius:16px;font-weight:800;color:#fff;font-size:0.9rem;cursor:pointer;transition:transform .2s ease,filter .2s ease;}
  .card button{width:100%;margin-top:8px;}
  button:hover{transform:translateY(-1px);}
  .buy-btn{background:linear-gradient(135deg,#2563eb,#3b82f6);box-shadow:0 10px 22px rgba(59,130,246,.22);}
  .buy-btn:hover{filter:brightness(1.05);}
  .btn-bought{background:#10b981;box-shadow:0 10px 18px rgba(16,185,129,.18);}
  .pagination{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;margin:16px 0;}
  .pagination button{border:none;background:#f1f5f9;color:#0f172a;padding:10px 14px;border-radius:14px;font-weight:700;cursor:pointer;transition:all .2s ease;}
  .pagination button:hover:not(:disabled){background:#e2e8f0;}
  .pagination button.active{background:#3b82f6;color:#fff;}
  .pagination button:disabled{opacity:0.5;cursor:not-allowed;}
  .page-ellipsis{padding:10px 4px;color:#64748b;font-weight:700;}
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;justify-content:center;align-items:center;padding:16px;z-index:999;}
  .modal-box{position:relative;background:var(--surface);width:100%;max-width:420px;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);}
  .modal-header{padding:16px;text-align:right;}
  .close{font-size:20px;cursor:pointer;color:#64748b;}
  .modal-body{padding:0 24px 24px;text-align:center;}
  #messageModal .modal-box{padding:24px 24px 22px;}
  #messageModal .modal-body{padding:0;margin-top:12px;text-align:left;}
  .message-close{position:absolute;top:16px;right:16px;width:36px;height:36px;border:none;border-radius:50%;background:#f8fafc;color:#000;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .link{padding:14px 16px;background:#f8fafc;border-radius:16px;word-break:break-all;font-size:0.96rem;color:#0f172a;}
  #donateModal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:99999;justify-content:center;align-items:center;padding:16px;}
  .donate-card{background:var(--surface);width:100%;max-width:380px;border-radius:28px;padding:28px 22px;text-align:center;position:relative;box-shadow:0 25px 60px rgba(15,23,42,.18);}
  .donate-close{position:absolute;top:16px;right:16px;font-size:24px;background:none;border:none;cursor:pointer;color:#475569;font-weight:700;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
  .donate-title{font-size:1.4rem;margin:0 0 10px;color:#ef4444;font-weight:800;}
  .donate-desc{color:#64748b;margin-bottom:22px;font-size:0.95rem;}
  .donate-img{width:100%;max-width:260px;height:auto;border-radius:20px;box-shadow:0 14px 32px rgba(15,23,42,.12);}
  .donate-tip{margin-top:16px;color:#94a3b8;font-size:0.92rem;line-height:1.5;}
  .category-tabs{background:var(--surface);padding:14px 16px;border-radius:18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow);flex-wrap:wrap;}
  .category-btn{padding:10px 18px;border:2px solid #e2e8f0;background:#fff;color:var(--text);border-radius:14px;font-weight:700;font-size:0.92rem;cursor:pointer;transition:all .3s ease;}
  .category-btn:hover{border-color:#3b82f6;color:#3b82f6;}
  .category-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6;box-shadow:0 10px 22px rgba(59,130,246,.22);}
  .video-filter{position:relative;display:flex;align-items:center;}
  .filter-toggle{padding:10px 16px;border:2px solid #e2e8f0;background:#fff;color:var(--text);border-radius:14px;font-weight:700;font-size:0.92rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .filter-caret{font-size:0.95rem;transform:translateY(1px);}
  .filter-menu{position:absolute;top:calc(100% + 8px);right:0;background:var(--surface);border:1px solid #e2e8f0;border-radius:18px;box-shadow:var(--shadow);padding:8px;display:none;flex-direction:column;min-width:160px;z-index:10;}
  .filter-menu.open{display:flex;}
  .filter-option{background:none;border:none;text-align:left;padding:10px 12px;border-radius:14px;color:var(--text);cursor:pointer;font-weight:700;font-size:0.92rem;transition:background .2s ease;}
  .filter-option:hover{background:#eef4ff;}
  .filter-option.active{background:#3b82f6;color:#fff;}
  @media (max-width: 420px){.container{padding:18px 12px 22px;}.top,.donate-card,.modal-box{border-radius:20px;}.sign-btn{padding:13px 16px;font-size:0.98rem;}.donate-img{width:100%;}.top button{flex:0 1 auto;}.top .user-name{flex:1 1 100%;}.search-box{padding:12px;}.task-action{flex-direction:column;align-items:stretch;}.tasks-panel{max-width:100%;padding:18px 14px;}.modal-body{padding:0 16px 20px;}.link{font-size:0.92rem;}.top-right{justify-content:space-between;}.task-box{justify-content:center;}.category-tabs{padding:12px;gap:8px;}.video-filter{width:100%;}.filter-toggle{width:100%;justify-content:space-between;}.filter-menu{min-width:auto;width:100%;right:0;}} 
  @media (max-width: 320px){.top{padding:14px 12px;}.search-input{font-size:0.92rem;}.buy-btn,.btn-bought{padding:12px 0;}.card{min-height:auto;}.top .small-btn{padding:8px 10px;}}
</style>
</head>

<body>
<div class="container">
  <!-- 右上角：金币 + 打赏 -->
  <div class="top-right">
    <button id="tasksToggleBtn" class="task-box" onclick="openTasks()">🎯 <span class="task-label">任务</span></button>
    <div class="coin-box">
      🪙 <span id="coins">0</span>
    </div>
    <!--
    <button class="donate-btn" onclick="openDonate()">☕ 打赏支持</button>
    -->
  </div>

  <!-- 顶部信息 -->
  <div class="top">
    <div class="user-name">用户：<span id="user">-</span></div>
    <div class="user-note">每日持续更新ing！资源不断补充，记得常回来看看～</div>
    <!--
    <button class="small-btn" onclick="showGuide()">🌍 原版导航</button>
    -->
    <!-- 任务入口已移至右上角 -->
    <button class="small-btn" onclick="showAnnouncement()">📢 公告</button>
    
    <button class="small-btn" onclick="showExtractGuide()">📦 解压方法</button>
    <!--
    <button class="small-btn" onclick="showTestDate()">⏰ 测试</button>
    -->
    <button class="small-btn" onclick="openMessage()">✉️ 留言</button>
    <!--
    <button class="sign-btn" onclick="signIn()">📅 签到</button>
    -->
    <button id="topActionButton">退出登录</button>
  </div>

<!-- 搜索框 -->
<div class="search-box">
  <input type="text" id="searchInput" class="search-input" placeholder="搜索商品名...">
  <button class="search-btn" onclick="doSearch()">🔍</button>
  <button class="clear-btn" onclick="clearSearch()">✕</button>
</div>

<!-- 分类标签 -->
<div class="category-tabs">
  <button class="category-btn active" onclick="switchCategory(event, 'video')">📺 里番</button>
  <button class="category-btn" onclick="switchCategory(event, 'comic')">📚 本子</button>
  <div id="videoFilterWrapper" class="video-filter">
    <button class="filter-option active" data-filter="all" onclick="selectVideoFilter('all')">全部</button>
    <button class="filter-option" data-filter="original" onclick="selectVideoFilter('original')">原版</button>
    <button class="filter-option" data-filter="edited" onclick="selectVideoFilter('edited')">剪辑版</button>
    <button class="filter-option" data-filter="cracked" onclick="selectVideoFilter('cracked')">破解版</button>
  </div>
</div>

<!-- 任务中心（侧滑面板） -->
<div id="tasksPanel" class="tasks-panel" aria-hidden="true">
  <div class="panel-header">
    <h3>任务中心</h3>
    <button class="panel-close" onclick="closeTasks()">✕</button>
  </div>
  <div style="overflow:auto;flex:1;padding-right:6px;">
    <div class="task-list" id="tasks"></div>
  </div>
</div>

<!-- 商品 -->
<div class="grid" id="items"></div>
<div id="pagination" class="pagination"></div>

<!-- 链接弹窗 -->
<div class="modal" id="linkModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <h3>商品链接</h3>
      <div id="linkText" class="link"></div>
    </div>
  </div>
</div>

<!-- 原版导航弹窗 -->
<div class="modal" id="guideModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeGuide()">✕</span>
    </div>
    <div class="modal-body">
      <h3>原版导航</h3>
      <div class="link" id="guideText"></div>
    </div>
  </div>
</div>

<!-- 公告弹窗 -->
<div class="modal" id="announceModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeAnnouncement()">✕</span>
    </div>
    <div class="modal-body">
      <h3>公告</h3>
      <div class="link">本网站为个人兴趣所搭建，用于分享个人整理资源，各位有什么想要的资源或者想法可以在留言板块留言。网站处于初步阶段，资源会持续更新！剪辑版指的是把平时需要跳过的部分都删除了，只剩打桩部分，并且把整个系列整合到一个视频，直接全程起飞</div>
    </div>
  </div>
</div>

<!-- 解压方法弹窗 -->
<div class="modal" id="extractGuideModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeExtractGuide()">✕</span>
    </div>
    <div class="modal-body">
      <h3>解压方法</h3>
      <div class="link">压缩包密码统一为：<strong>上老王论坛当老王</strong><br><br>将拓展名末尾的"删"字删除即可得到正常压缩包或视频。<br></div>
    </div>
  </div>
</div>

<!-- 测试日期弹窗 -->
<div class="modal" id="testDateModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeTestDate()">✕</span>
    </div>
    <div class="modal-body">
      <h3>当前日期与时间</h3>
      <div class="link" id="testDateText"></div>
    </div>
  </div>
</div>

<!-- 留言弹窗 -->
<div class="modal" id="messageModal">
  <div class="modal-box">
    <button class="message-close" onclick="closeMessage()" title="关闭">✕</button>
    <div class="modal-body">
      <h3>发送留言</h3>
      <textarea id="messageText" rows="6" placeholder="请输入留言内容..." style="width:100%;padding:12px;border:1px solid #e2e8f0;border-radius:14px;resize:vertical;font-size:0.95rem;"></textarea>
      <button class="search-btn" style="margin-top:16px;width:100%;" onclick="sendMessage()">发送留言</button>
    </div>
  </div>
</div>

<!-- 打赏弹窗 -->
<div id="donateModal">
  <div class="donate-card">
    <button class="donate-close" onclick="closeDonate()">✕</button>
    <div class="donate-title">💖 感谢支持</div>
    <div class="donate-desc">您的鼓励是我持续更新的动力</div>
    <img src="pay.jpg" class="donate-img" alt="收款码">
    <div class="donate-tip">微信 / 支付宝 长按扫码支付</div>
  </div>
</div>
</div>

<script>
  const user = localStorage.getItem("loginUser");
  let userCoins = 0;
  let userEmail = "";
  const boughtMap = {};
  let allItems = [];
  let allTasks = [];
  let currentSearchQuery = "";
  let currentCategory = 'video';
  let currentVideoFilter = 'all';
  let currentPage = 1;
  const itemsPerPage = 20;

  window.onload = initPage;

  async function initPage() {
    const button = document.getElementById('topActionButton');
    if (!user) {
      document.getElementById("user").innerText = "未登录";
        document.getElementById("coins").innerText = 0;
        button.innerText = "登录/注册";
        button.onclick = () => location.href = "/register.html";
      showAnnouncement();
      await loadItems();
      await loadTasks();
      return;
    }

    button.innerText = "退出登录";
    button.onclick = () => {
      localStorage.removeItem('loginUser');
      location.reload();
    };
    await loadUserInfo();
    await loadItems();
    await loadTasks();
  }

  async function loadUserInfo() {
    const u = await fetch("/api/userinfo", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: user }) });
    const d = await u.json();
    if (d.ok) {
      userCoins = d.user.coins;
      userEmail = d.user.email || "";
      (d.bought || []).forEach(b => {
        const id = b.item_id;
        const t = Number(b.type);
        if (!boughtMap[id]) boughtMap[id] = [];
        boughtMap[id].push(t);
      });
      document.getElementById("user").innerText = user;
      document.getElementById("coins").innerText = userCoins;
    }
  }

  async function loadTasks() {
    const url = user ? `/api/tasks?username=${encodeURIComponent(user)}` : "/api/tasks";
    const r = await fetch(url);
    const data = await r.json();
    allTasks = data.tasks || [];
    renderTasks(allTasks);
  }

  function renderTasks(tasks) {
    const dom = document.getElementById("tasks");
    if (!tasks || tasks.length === 0) {
      dom.innerHTML = '<div class="no-tasks">暂无可领取的任务，完成后奖励金币会自动发放。</div>';
      return;
    }
    dom.innerHTML = "";
    tasks.forEach(task => {
      const isDaily = (task.task_type || 'once') === 'daily';
      const isAvailable = task.is_available !== false; // default true for backward compat
      const completedToday = task.completed_today || false;
      const completedEver = task.completed_ever || false;
      
      let statusText = '提交';
      let statusStyle = '';
      let inputDisabled = '';
      let buttonDisabled = '';
      
      if (!isAvailable) {
        if (isDaily && completedToday) {
          statusText = '今日已完成';
          statusStyle = 'color:#10b981;font-weight:700;';
          inputDisabled = 'disabled';
          buttonDisabled = 'disabled';
        } else if (!isDaily && completedEver) {
          statusText = '任务已完成';
          statusStyle = 'color:#10b981;font-weight:700;';
          inputDisabled = 'disabled';
          buttonDisabled = 'disabled';
        }
      }
      
      let description = task.description;
      if (task.id === 3 && typeof description === 'string') {
        description = description.replace(/https:\/\//g, '\nhttps://');
        description = description.replace(/即可获得/g, '\n即可获得');
        description = description.replace(/\n+/g, '\n');
        description = description.trim();
        description = description.replace(/\n/g, '<br>');
      }
      
      dom.innerHTML += `
        <div class="task-card" ${!isAvailable ? 'style="opacity:0.7;"' : ''}>
          <h4>${task.title}</h4>
          <div class="task-desc">${description}</div>
          <div class="task-action">
            <div class="task-reward">+${task.reward_coins} 金币</div>
            <div style="display:flex;gap:8px;align-items:center;width:100%;${!isAvailable ? 'opacity:0.6;' : ''}">
              <input id="task_code_${task.id}" maxlength="6" placeholder="输入6位验证码" style="flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:12px;font-size:0.9rem;" ${inputDisabled}>
              <button class="task-btn" onclick="completeTask(${task.id})" ${buttonDisabled} style="${statusStyle}">${!user ? '登录后提交' : statusText}</button>
            </div>
          </div>
        </div>
      `;
    });
  }

  async function completeTask(taskId) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    
    // Find the task to check its status
    const task = allTasks.find(t => t.id === taskId);
    if (!task) {
      alert('任务不存在');
      return;
    }
    
    // Check if task is available
    if (task.is_available === false) {
      const isDaily = (task.task_type || 'once') === 'daily';
      if (isDaily && task.completed_today) {
        alert('今日任务已完成');
      } else {
        alert('任务已完成');
      }
      return;
    }
    
    const codeInput = document.getElementById(`task_code_${taskId}`);
    const code = codeInput ? codeInput.value.trim() : "";
    if (!code || code.length !== 6) return alert('请输入6位验证码');
    const r = await fetch("/api/task/complete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, task_id: taskId, code })
    });
    const d = await r.json();
    alert(d.msg || "任务提交失败");
    if (d.ok) {
      userCoins = d.coins !== undefined ? d.coins : userCoins;
      document.getElementById('coins').innerText = userCoins;
      loadTasks();
    }
  }

  async function loadItems() {
    const r = await fetch("/api/items");
    const data = await r.json();
    allItems = (data.items || []).sort((a, b) => b.id - a.id);
    updateVideoFilterUI();
    filterAndRenderItems();
  }

  function filterVideoItem(item) {
    if (currentCategory !== 'video' || currentVideoFilter === 'all') return true;
    if (currentVideoFilter === 'original') return item.link_1 && item.link_1.toString().trim() !== '';
    if (currentVideoFilter === 'edited') return item.link_2 && item.link_2.toString().trim() !== '';
    if (currentVideoFilter === 'cracked') return item.link_3 && item.link_3.toString().trim() !== '';
    return true;
  }

  function filterAndRenderItems() {
    let filtered = allItems.filter(item => item.type === currentCategory);
    if (currentCategory === 'video') {
      filtered = filtered.filter(filterVideoItem);
    }
    if (currentSearchQuery) {
      filtered = filtered.filter(item => item.name.toLowerCase().includes(currentSearchQuery.toLowerCase()));
    }

    const totalItems = filtered.length;
    const totalPages = Math.max(1, Math.ceil(totalItems / itemsPerPage));
    if (currentPage > totalPages) currentPage = totalPages;

    const startIndex = (currentPage - 1) * itemsPerPage;
    const pageItems = filtered.slice(startIndex, startIndex + itemsPerPage);

    renderItems(pageItems);
    renderPagination(totalPages);
  }

  function renderPagination(totalPages) {
    const dom = document.getElementById('pagination');
    if (!dom) return;

    if (totalPages <= 1) {
      dom.innerHTML = '';
      return;
    }

    const buttons = [];
    buttons.push(`<button onclick="gotoPage(${Math.max(1, currentPage - 1)})" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`);

    const startPage = Math.max(1, currentPage - 2);
    const endPage = Math.min(totalPages, currentPage + 2);

    if (startPage > 1) {
      buttons.push(`<button onclick="gotoPage(1)">1</button>`);
      if (startPage > 2) buttons.push(`<span class="page-ellipsis">...</span>`);
    }

    for (let i = startPage; i <= endPage; i++) {
      buttons.push(`<button class="${i === currentPage ? 'active' : ''}" onclick="gotoPage(${i})">${i}</button>`);
    }

    if (endPage < totalPages) {
      if (endPage < totalPages - 1) buttons.push(`<span class="page-ellipsis">...</span>`);
      buttons.push(`<button onclick="gotoPage(${totalPages})">${totalPages}</button>`);
    }

    buttons.push(`<button onclick="gotoPage(${Math.min(totalPages, currentPage + 1)})" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`);
    dom.innerHTML = buttons.join('');
  }

  function gotoPage(page) {
    if (page === currentPage) return;
    currentPage = page;
    filterAndRenderItems();
    const itemsSection = document.getElementById('items');
    if (itemsSection) {
      itemsSection.scrollIntoView({  block: 'start' });
    }
  }

  function switchCategory(evt, category) {
    if (currentCategory === category) return;
    currentCategory = category;
    currentSearchQuery = "";
    currentPage = 1;
    document.getElementById("searchInput").value = "";
    document.querySelectorAll(".category-btn").forEach(btn => {
      btn.classList.remove('active');
    });
    if (evt && evt.target) evt.target.classList.add('active');
    updateVideoFilterUI();
    filterAndRenderItems();
  }

  function renderItems(items) {
    const dom = document.getElementById("items");
    dom.innerHTML = "";
    console.log('renderItems', items ? items.length : 0);
    items.forEach(it => {
      console.log('item image', it.id, it.image);
      const labels = ['原版','剪辑版','破解'];
      const availableLabels = [];
      for (let t = 1; t <= 3; t++) {
        const field = it[`link_${t}`];
        if (field && field.toString().trim() !== '') {
          availableLabels.push(labels[t-1]);
        }
      }
      const labelHtml = availableLabels.map(label => `<span class="label-badge">${label}</span>`).join('');
      const purchasedTypes = (boughtMap[it.id] || []).filter(t => it[`link_${t}`] && it[`link_${t}`].toString().trim() !== '');
      const actionLabel = purchasedTypes.length > 0 ? '链接' : '购买';
      const actionClass = purchasedTypes.length > 0 ? 'btn-bought' : 'buy-btn';
      const actionHandler = purchasedTypes.length > 0 ? `showItemLinks(${it.id})` : `showBuyOptions(${it.id})`;

      const lengthLabel = it.type === 'video'
        ? `${it.length || '-'}`
        : it.type === 'comic'
          ? `${it.length || '-'} 张`
          : `${it.length || '-'}`;
      const sizeLabel = `${it.size || '-'}`;
       const availableDiskTypes = [];
       for (let t = 1; t <= 3; t++) {
         const link1 = it[`link_${t}`];
         const link2 = it[`link_${t}_2`];
         if (link1 && link1.toString().trim() !== '') {
           availableDiskTypes.push('百度盘');
         }
         if (link2 && link2.toString().trim() !== '') {
           availableDiskTypes.push('迅雷盘');
         }
       }
       const uniqueDiskTypes = [...new Set(availableDiskTypes)];
       const diskLabel = uniqueDiskTypes.length > 0 ? uniqueDiskTypes.join('，') : '';
      dom.innerHTML += `
        <div class="card">
          <div class="image-wrapper">
            <img src="${it.image}" onerror="this.onerror=null;this.src='/image/placeholder.png';console.error('image load error','${it.image}');">
            <div class="label-badges">${labelHtml}</div>
          </div>
          <div class="name">${it.name}</div>
          <div class="item-meta"><span>${lengthLabel}</span><span>${sizeLabel}</span></div>
           ${diskLabel ? `<div class="item-meta" style="color:#ff5874;font-weight:600;"><span>${diskLabel}</span></div>` : ''}
          <button class="${actionClass}" onclick="${actionHandler}">${actionLabel}</button>
        </div>
      `;
    });
  }

  function showBuyOptions(itemId) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    const item = allItems.find(i => i.id == itemId);
    if (!item) return alert('商品不存在');
    const labels = ['原版','剪辑版','破解'];
    const options = [];
    for (let t = 1; t <= 3; t++) {
      const link = item[`link_${t}`];
      if (link && link.toString().trim() !== '') {
        options.push({ type: t, label: labels[t-1] });
      }
    }
    if (options.length === 0) return alert('暂无可购买的链接');
    if (options.length === 1) {
      buy(itemId, options[0].type);
      return;
    }
    let promptText = '请选择购买类型：\n';
    options.forEach((option, index) => {
      promptText += `${index + 1}. ${option.label}\n`;
    });
    const choice = prompt(promptText);
    if (!choice) return;
    const selected = options[Number(choice) - 1];
    if (!selected) return alert('无效选择');
    buy(itemId, selected.type);
  }

  async function showItemLinks(itemId) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    const r = await fetch("/api/items");
    const data = await r.json();
    const item = data.items.find(i => i.id == itemId);
    if (!item) return alert('商品不存在');
    const linkTypeLabels = ['百度盘', '迅雷盘'];
    const purchasedTypes = (boughtMap[itemId] || []).filter(t => item[`link_${t}`] && item[`link_${t}`].toString().trim() !== '');
    if (purchasedTypes.length === 0) return alert('尚未购买任何链接');
    const html = purchasedTypes.map(t => {
      const link1 = item[`link_${t}`];
      const link2 = item[`link_${t}_2`];
      let typeHtml = '';
      if (link1 && link1.toString().trim() !== '') {
        typeHtml += `<div>${linkTypeLabels[0]}：<br>${link1}</div>`;
      }
      if (link2 && link2.toString().trim() !== '') {
        typeHtml += `<div>${linkTypeLabels[1]}：<br>${link2}</div>`;
      }
      return typeHtml;
    }).join('');
    document.getElementById("linkText").innerHTML = html;
    document.getElementById("linkModal").style.display = "flex";
  }

  async function buy(itemId, type) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    const price = 1;
    if (userCoins < price) return alert("金币不足，请完成任务获取金币。");
    const labels = ['原版','剪辑','破解'];
    const choice = labels[type - 1] || '该类型';
    if (!confirm(`确认花费 1 金币购买 ${choice} 吗？`)) return;
    const r = await fetch("/api/buy", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: user, item_id: itemId, type }) });
    const d = await r.json();
    alert(d.msg);
    if (d.ok) {
      userCoins = d.coins !== undefined ? d.coins : userCoins - price;
      if (!boughtMap[itemId]) boughtMap[itemId] = [];
      if (!boughtMap[itemId].includes(type)) boughtMap[itemId].push(type);
      document.getElementById('coins').innerText = userCoins;
      loadItems();
    }
  }

  async function showLink(itemId, type) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    const r = await fetch("/api/items");
    const data = await r.json();
    const item = data.items.find(i => i.id == itemId);
    const link = type === 1 ? item.link_1 : type === 2 ? item.link_2 : item.link_3;
    document.getElementById("linkText").innerText = link || "链接不存在";
    document.getElementById("linkModal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("linkModal").style.display = "none";
  }

  function showGuide() {
    const text = "本站提供剪辑版与破解版资源，为避免违规，原版资源网站网址在网盘自取\n：\nhttps://pan.baidu.com/s/1bKeNHyP1i2ijUqdRP2-huw?pwd=ifvc\n提取码: ifvc";
    document.getElementById("guideText").innerText = text;
    document.getElementById("guideModal").style.display = "flex";
  }

  function closeGuide() {
    document.getElementById("guideModal").style.display = "none";
  }

  function showAnnouncement() {
    document.getElementById("announceModal").style.display = "flex";
  }

  function closeAnnouncement() {
    document.getElementById("announceModal").style.display = "none";
  }

  function showExtractGuide() {
    document.getElementById("extractGuideModal").style.display = "flex";
  }

  function closeExtractGuide() {
    document.getElementById("extractGuideModal").style.display = "none";
  }

  function showTestDate() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const date = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    
    const dateYYMMDD = year.toString().slice(-2) + month + date;
    const dateString = `日期: ${year}-${month}-${date}<br>时间: ${hours}:${minutes}:${seconds}<br><br>YYMMDD格式: ${dateYYMMDD}`;
    
    document.getElementById("testDateText").innerHTML = dateString;
    document.getElementById("testDateModal").style.display = "flex";
  }

  function closeTestDate() {
    document.getElementById("testDateModal").style.display = "none";
  }

  function openMessage() {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    document.getElementById("messageText").value = "";
    document.getElementById("messageModal").style.display = "flex";
  }

  function closeMessage() {
    document.getElementById("messageModal").style.display = "none";
  }

  async function sendMessage() {
    const text = document.getElementById("messageText").value.trim();
    if (!text) return alert("请输入留言内容");
    const response = await fetch("/api/message", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username: user, email: userEmail, text, time: new Date().toISOString() })
    });
    const data = await response.json();
    alert(data.msg || "留言失败");
    if (data.ok) {
      closeMessage();
    }
  }

  function doSearch() {
    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    if (!query) {
      alert("请输入搜索关键词");
      return;
    }
    currentSearchQuery = query;
    currentPage = 1;
    filterAndRenderItems();
  }

  function clearSearch() {
    document.getElementById("searchInput").value = "";
    currentSearchQuery = "";
    filterAndRenderItems();
  }

  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doSearch();
      });
    }
  });

  async function signIn() {
    const r = await fetch("/api/sign", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: user }) });
    const d = await r.json();
    alert(d.msg);
    if (d.ok) {
      userCoins = d.coins || userCoins;
      document.getElementById('coins').innerText = userCoins;
      loadItems();
      loadTasks();
    }
  }

  function updateVideoFilterUI() {
    const wrapper = document.getElementById('videoFilterWrapper');
    if (!wrapper) return;
    wrapper.style.display = currentCategory === 'video' ? 'flex' : 'none';
    document.querySelectorAll('.filter-option').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.filter === currentVideoFilter);
    });
  }

  function selectVideoFilter(filter) {
    currentVideoFilter = filter;
    updateVideoFilterUI();
    filterAndRenderItems();
  }

  // 打赏弹窗
  function openDonate() { document.getElementById("donateModal").style.display = "flex"; }
  function closeDonate() { document.getElementById("donateModal").style.display = "none"; }
  document.getElementById('donateModal').addEventListener('click', function(e) { if (e.target === this) closeDonate(); });

  // 任务面板控制（侧滑） - 切换逻辑，禁用滚动，Esc 关闭
  function openTasks() {
    const panel = document.getElementById("tasksPanel");
    const toggleBtn = document.getElementById("tasksToggleBtn");
    const isOpen = panel.classList.contains('open');
    if (isOpen) return closeTasks();
    loadTasks();
    panel.classList.add('open');
    panel.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
    if (toggleBtn) toggleBtn.classList.add('active');
  }
  function closeTasks() {
    const panel = document.getElementById("tasksPanel");
    const toggleBtn = document.getElementById("tasksToggleBtn");
    panel.classList.remove('open');
    panel.setAttribute('aria-hidden', 'true');
    document.body.style.overflow = '';
    if (toggleBtn) toggleBtn.classList.remove('active');
  }
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      const panel = document.getElementById("tasksPanel");
      if (panel && panel.classList.contains('open')) closeTasks();
    }
  });
</script>
