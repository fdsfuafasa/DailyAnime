<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商城主页</title>
<style>
  :root{
    --bg:#eef4ff;
    --surface:#ffffff;
    --primary:#3b82f6;
    --accent:#ff5874;
    --text:#0f172a;
    --muted:#64748b;
    --radius:22px;
    --shadow:0 24px 60px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:linear-gradient(180deg,#f7fbff,#eef4ff);color:var(--text);font-family:"Segoe UI",system-ui,Arial,sans-serif;min-height:100vh;}
  .container{max-width:500px;margin:0 auto;padding:20px 16px 24px;}
  .top{background:var(--surface);padding:18px 16px;border-radius:26px;margin-bottom:16px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;box-shadow:var(--shadow);}
  .top .user-name{font-size:0.95rem;font-weight:700;word-break:break-word;}
  .top button{width:auto;border:none;background:#e2e8f0;color:var(--text);padding:8px 12px;border-radius:14px;font-weight:700;font-size:0.88rem;cursor:pointer;}
  .top button#topActionButton{min-width:110px;}
  .top .small-btn{padding:6px 10px;font-size:0.82rem;}
  .top-right{position:sticky;top:14px;display:flex;align-items:center;justify-content:flex-end;gap:10px;margin-bottom:16px;z-index:10;}
  .coin-box{background:linear-gradient(135deg,#ffd700,#ff9500);color:#fff;padding:10px 14px;border-radius:999px;font-weight:700;display:flex;align-items:center;gap:6px;box-shadow:0 12px 28px rgba(255,149,0,.18);}
  .donate-btn{background:linear-gradient(135deg,#ff6699,#ff3366);color:#fff;border:none;padding:10px 16px;border-radius:999px;font-weight:700;cursor:pointer;box-shadow:0 12px 24px rgba(255,51,102,.18);}
  .sign-btn{width:auto;padding:6px 10px;border:none;border-radius:14px;background:linear-gradient(135deg,#ff8f00,#ff6a00);color:#fff;font-weight:700;font-size:0.82rem;cursor:pointer;}
  .search-box{background:var(--surface);padding:14px 16px;border-radius:18px;margin-bottom:16px;display:flex;gap:10px;align-items:center;box-shadow:var(--shadow);}
  .search-input{flex:1;padding:10px 14px;border:1px solid #e2e8f0;border-radius:14px;font-size:0.95rem;color:var(--text);font-family:inherit;}
  .search-input::placeholder{color:#94a3b8;}
  .search-btn{width:auto;padding:10px 14px;border:none;border-radius:14px;background:#3b82f6;color:#fff;font-weight:700;font-size:0.88rem;cursor:pointer;}
  .search-btn:hover{background:#2563eb;}
  .clear-btn{width:auto;padding:10px 12px;border:none;border-radius:14px;background:#e2e8f0;color:var(--text);font-weight:700;font-size:0.88rem;cursor:pointer;}
  .grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;}
  @media (max-width: 860px){.grid{grid-template-columns:repeat(4,minmax(0,1fr));}}
  @media (max-width: 660px){.grid{grid-template-columns:repeat(3,minmax(0,1fr));}}
  @media (max-width: 480px){.grid{grid-template-columns:repeat(2,minmax(0,1fr));}}
  .card{background:var(--surface);border-radius:24px;padding:10px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:var(--shadow);min-height:240px;}
  .card img{width:100%;aspect-ratio:1 / 1;border-radius:16px;object-fit:cover;}
  .name{font-weight:800;margin:12px 0 6px;font-size:0.92rem;line-height:1.25;min-height:2.5em;}
  .price{color:#fb923c;margin:0 0 10px;font-size:0.88rem;}
  button{width:100%;padding:14px 0;border:none;border-radius:16px;font-weight:800;color:#fff;font-size:0.97rem;cursor:pointer;transition:transform .2s ease,filter .2s ease;}
  button:hover{transform:translateY(-1px);}
  .buy-btn{background:linear-gradient(135deg,#2563eb,#3b82f6);box-shadow:0 10px 22px rgba(59,130,246,.22);}
  .buy-btn:hover{filter:brightness(1.05);}
  .btn-bought{background:#10b981;box-shadow:0 10px 18px rgba(16,185,129,.18);}
  .modal{position:fixed;inset:0;background:rgba(15,23,42,.55);display:none;justify-content:center;align-items:center;padding:16px;z-index:999;}
  .modal-box{background:var(--surface);width:100%;max-width:420px;border-radius:24px;overflow:hidden;box-shadow:var(--shadow);}
  .modal-header{padding:16px;text-align:right;}
  .close{font-size:20px;cursor:pointer;color:#64748b;}
  .modal-body{padding:0 24px 24px;text-align:center;}
  .link{padding:14px 16px;background:#f8fafc;border-radius:16px;word-break:break-all;font-size:0.96rem;color:#0f172a;}
  #donateModal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.8);z-index:99999;justify-content:center;align-items:center;padding:16px;}
  .donate-card{background:var(--surface);width:100%;max-width:380px;border-radius:28px;padding:28px 22px;text-align:center;position:relative;box-shadow:0 25px 60px rgba(15,23,42,.18);}
  .donate-close{position:absolute;top:16px;right:16px;font-size:24px;background:none;border:none;cursor:pointer;color:#475569;font-weight:700;width:34px;height:34px;display:flex;align-items:center;justify-content:center;}
  .donate-title{font-size:1.4rem;margin:0 0 10px;color:#ef4444;font-weight:800;}
  .donate-desc{color:#64748b;margin-bottom:22px;font-size:0.95rem;}
  .donate-img{width:100%;max-width:260px;height:auto;border-radius:20px;box-shadow:0 14px 32px rgba(15,23,42,.12);}
  .donate-tip{margin-top:16px;color:#94a3b8;font-size:0.92rem;line-height:1.5;}
  @media (max-width: 360px){.container{padding:18px 12px 22px;}.top,.donate-card,.modal-box{border-radius:20px;}.sign-btn{padding:13px 16px;font-size:0.98rem;}.donate-img{width:100%;}}
</style>
</head>

<body>
<div class="container">
  <!-- 右上角：金币 + 打赏 -->
  <div class="top-right">
    <div class="coin-box">
      🪙 <span id="coins">0</span>
    </div>
    <!--
    <button class="donate-btn" onclick="openDonate()">☕ 打赏支持</button>
    -->
  </div>

  <!-- 顶部信息 -->
  <div class="top">
    <div class="user-name">用户：<span id="user">-</span></div>
    <button class="small-btn" onclick="showGuide()">🌍 原版导航</button>
    <button class="sign-btn" onclick="signIn()">📅 签到</button>
    <button id="topActionButton">退出登录</button>
  </div>

<!-- 搜索框 -->
<div class="search-box">
  <input type="text" id="searchInput" class="search-input" placeholder="搜索商品名...">
  <button class="search-btn" onclick="doSearch()">🔍</button>
  <button class="clear-btn" onclick="clearSearch()">✕</button>
</div>

<!-- 商品 -->
<div class="grid" id="items"></div>

<!-- 链接弹窗 -->
<div class="modal" id="linkModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <h3>商品链接</h3>
      <div id="linkText" class="link"></div>
    </div>
  </div>
</div>

<!-- 原版导航弹窗 -->
<div class="modal" id="guideModal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="close" onclick="closeGuide()">✕</span>
    </div>
    <div class="modal-body">
      <h3>原版导航</h3>
      <div class="link" id="guideText"></div>
    </div>
  </div>
</div>

<!-- 打赏弹窗 -->
<div id="donateModal">
  <div class="donate-card">
    <button class="donate-close" onclick="closeDonate()">✕</button>
    <div class="donate-title">💖 感谢支持</div>
    <div class="donate-desc">您的鼓励是我持续更新的动力</div>
    <img src="pay.jpg" class="donate-img" alt="收款码">
    <div class="donate-tip">微信 / 支付宝 长按扫码支付</div>
  </div>
</div>
</div>

<script>
  const user = localStorage.getItem("loginUser");
  let userCoins = 0;
  const boughtMap = {};
  let allItems = [];
  let currentSearchQuery = "";

  window.onload = initPage;

  async function initPage() {
    const button = document.getElementById('topActionButton');
    if (!user) {
      document.getElementById("user").innerText = "未登录";
        document.getElementById("coins").innerText = 0;
        button.innerText = "登录/注册";
        button.onclick = () => location.href = "/register.html";
      loadItems();
      return;
    }

    button.innerText = "退出登录";
    button.onclick = () => {
      localStorage.removeItem('loginUser');
      location.reload();
    };
    await loadUserInfo();
    loadItems();
  }

  async function loadUserInfo() {
    const u = await fetch("/api/userinfo", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: user }) });
    const d = await u.json();
    if (d.ok) {
      userCoins = d.user.coins;
      (d.bought || []).forEach(b => {
        const id = b.item_id;
        const t = Number(b.type);
        if (!boughtMap[id]) boughtMap[id] = [];
        boughtMap[id].push(t);
      });
      document.getElementById("user").innerText = user;
      document.getElementById("coins").innerText = userCoins;
    }
  }

  async function loadItems() {
    const r = await fetch("/api/items");
    const data = await r.json();
    allItems = data.items;
    renderItems(allItems);
  }

  function renderItems(items) {
    const dom = document.getElementById("items");
    dom.innerHTML = "";
    items.forEach(it => {
      let buttonsHtml = "";
      const labels = ['原版','剪辑','破解'];
      for (let t = 1; t <= 3; t++) {
        const field = it[`link_${t}`];
        if (!field || field.toString().trim() === '') continue;
        const isBought = boughtMap[it.id] && boughtMap[it.id].includes(t);
        if (isBought) buttonsHtml += `<button class="btn-bought" onclick="showLink(${it.id},${t})">${labels[t-1]}</button>`;
        else buttonsHtml += `<button class="buy-btn" onclick="buy(${it.id},${t})">🔒 ${labels[t-1]}</button>`;
      }

      dom.innerHTML += `
        <div class="card">
          <img src="${it.image}">
          <div class="name">${it.name}</div>
          ${buttonsHtml}
        </div>
      `;
    });
  }

  async function buy(itemId, type) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    const price = 1;
    if (userCoins < price) return alert("金币不足");
    const labels = ['原版','剪辑','破解'];
    const choice = labels[type - 1] || '该类型';
    if (!confirm(`确认花费 1 金币购买 ${choice} 吗？`)) return;
    const r = await fetch("/api/buy", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: user, item_id: itemId, type }) });
    const d = await r.json();
    alert(d.msg);
    if (d.ok) {
      userCoins = d.coins !== undefined ? d.coins : userCoins - price;
      if (!boughtMap[itemId]) boughtMap[itemId] = [];
      if (!boughtMap[itemId].includes(type)) boughtMap[itemId].push(type);
      document.getElementById('coins').innerText = userCoins;
      loadItems();
    }
  }

  async function showLink(itemId, type) {
    if (!user) {
      if (confirm('用户未登录，是否前往登录/注册？')) location.href = '/register.html';
      return;
    }
    const r = await fetch("/api/items");
    const data = await r.json();
    const item = data.items.find(i => i.id == itemId);
    const link = type === 1 ? item.link_1 : type === 2 ? item.link_2 : item.link_3;
    document.getElementById("linkText").innerText = link || "链接不存在";
    document.getElementById("linkModal").style.display = "flex";
  }

  function closeModal() {
    document.getElementById("linkModal").style.display = "none";
  }

  function showGuide() {
    const text = "本站提供剪辑版与破解版资源，为避免违规，原版资源网站网址在网盘自取\n：\nhttps://pan.baidu.com/s/1bKeNHyP1i2ijUqdRP2-huw?pwd=ifvc\n提取码: ifvc";
    document.getElementById("guideText").innerText = text;
    document.getElementById("guideModal").style.display = "flex";
  }

  function closeGuide() {
    document.getElementById("guideModal").style.display = "none";
  }

  function doSearch() {
    const query = document.getElementById("searchInput").value.trim().toLowerCase();
    if (!query) {
      alert("请输入搜索关键词");
      return;
    }
    currentSearchQuery = query;
    const filtered = allItems.filter(item => item.name.toLowerCase().includes(query));
    if (filtered.length === 0) {
      alert("未找到匹配的商品");
      document.getElementById("items").innerHTML = "";
      return;
    }
    renderItems(filtered);
  }

  function clearSearch() {
    document.getElementById("searchInput").value = "";
    currentSearchQuery = "";
    renderItems(allItems);
  }

  document.addEventListener('DOMContentLoaded', function() {
    const searchInput = document.getElementById("searchInput");
    if (searchInput) {
      searchInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') doSearch();
      });
    }
  });

  async function signIn() {
    const r = await fetch("/api/sign", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ username: user }) });
    const d = await r.json();
    alert(d.msg);
    if (d.ok) {
      userCoins = d.coins || userCoins;
      document.getElementById('coins').innerText = userCoins;
      loadItems();
    }
  }

  // 打赏弹窗
  function openDonate() { document.getElementById("donateModal").style.display = "flex"; }
  function closeDonate() { document.getElementById("donateModal").style.display = "none"; }
  document.getElementById('donateModal').addEventListener('click', function(e) { if (e.target === this) closeDonate(); });
</script>
