<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>D1 Test: user 表 CRUD</title>
<style>
body{font-family:Arial;padding:20px;}
button{padding:6px 12px;margin:5px;}
pre{background:#f5f5f5;padding:10px;}
</style>
</head>
<body>
<h2>测试 user 表（id TEXT, num INTEGER）</h2>

<div>
  <h3>1. 查询全部</h3>
  <button onclick="listAll()">GET /api/users</button>
</div>

<div>
  <h3>2. 新增</h3>
  <input id="new_id" placeholder="id (TEXT)">
  <input id="new_num" placeholder="num (INTEGER)" type="number">
  <button onclick="create()">POST /api/users</button>
</div>

<div>
  <h3>3. 更新</h3>
  <input id="upd_id" placeholder="id">
  <input id="upd_num" placeholder="新 num" type="number">
  <button onclick="update()">POST /api/users/update</button>
</div>

<div>
  <h3>4. 删除</h3>
  <input id="del_id" placeholder="id">
  <button onclick="del()">POST /api/users/delete</button>
</div>

<h3>返回结果：</h3>
<pre id="res"></pre>

<script>
const resEl = document.getElementById('res');

async function listAll() {
  const r = await fetch('/api/users');
  const data = await r.json();
  resEl.textContent = JSON.stringify(data, null, 2);
}

async function create() {
  const id = document.getElementById('new_id').value.trim();
  const num = parseInt(document.getElementById('new_num').value);
  const r = await fetch('/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, num })
  });
  const data = await r.json();
  resEl.textContent = JSON.stringify(data, null, 2);
}

async function update() {
  const id = document.getElementById('upd_id').value.trim();
  const num = parseInt(document.getElementById('upd_num').value);
  const r = await fetch('/api/users/update', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id, num })
  });
  const data = await r.json();
  resEl.textContent = JSON.stringify(data, null, 2);
}

async function del() {
  const id = document.getElementById('del_id').value.trim();
  const r = await fetch('/api/users/delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  const data = await r.json();
  resEl.textContent = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
