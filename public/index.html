<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>登录 / 注册 / 找回密码</title>
<style>
  :root{
    --bg:#f2f6fb;
    --surface:#ffffff;
    --primary:#246bff;
    --primary-strong:#1f57d4;
    --text:#152c53;
    --muted:#64748b;
    --radius:18px;
    --shadow:0 24px 60px rgba(14,30,37,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;background:linear-gradient(180deg,#edf2fb,#f9fbff);color:var(--text);font-family:"Segoe UI",system-ui,Arial,sans-serif;min-height:100vh;}
  .layout{max-width:460px;margin:0 auto;padding:24px 16px 28px;}
  h2{margin:0 0 18px;font-size:1.8rem;text-align:center;color:var(--primary);}
  .card{background:var(--surface);border-radius:28px;box-shadow:var(--shadow);padding:24px;}
  .tab{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:22px;}
  .tab button{border:none;padding:14px 12px;border-radius:999px;background:#eef4ff;color:var(--muted);font-size:0.96rem;font-weight:700;cursor:pointer;transition:all .2s ease;}
  .tab button.active{background:var(--primary);color:#fff;box-shadow:0 16px 32px rgba(36,107,255,.18);}
  .page{display:none;}
  .page.active{display:block;}
  input{width:100%;margin-top:14px;padding:14px 16px;border:1px solid #d8e4f2;border-radius:16px;background:#f8fbff;color:var(--text);font-size:1rem;outline:none;transition:border .2s ease,box-shadow .2s ease;}
  input:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(36,107,255,.08);}
  button{width:100%;margin-top:16px;padding:14px 16px;border:none;border-radius:16px;font-size:1rem;font-weight:700;color:#fff;background:var(--primary);cursor:pointer;transition:transform .18s ease,filter .18s ease;}
  button:hover{transform:translateY(-1px);filter:brightness(1.05);}
  .secondary{background:#5360a3;}
  .link{display:inline-flex;margin-top:10px;color:var(--primary);font-size:0.95rem;text-decoration:none;cursor:pointer;}
  #msg{min-height:24px;margin:18px 0 0;font-size:0.95rem;line-height:1.4;color:var(--muted);}
  .err{color:#d23f44;}
  .ok{color:#2e7d32;}
  @media (max-width: 360px){.layout{padding:20px 12px 22px;}.tab{gap:8px;}.tab button{padding:12px 10px;font-size:0.92rem;}.card{padding:20px;}}
</style>
</head>

<body>
<div class="layout">
<h2>账号系统</h2>

<div class="tab">
  <button class="tbtn active" data-page="login">登录</button>
  <button class="tbtn" data-page="register">注册</button>
</div>

<!-- ====================== 登录 ====================== -->
<div class="page active" id="login">
  <input placeholder="用户名" id="login_user">
  <input type="password" placeholder="密码" id="login_pwd">
  <button onclick="login()">登录</button>
  <button onclick="guest()">游客模式</button>
  <a onclick="showPage('forgot')">忘记密码？</a>
</div>

<!-- ====================== 注册 ====================== -->
<div class="page" id="register">
  <input placeholder="用户名" id="reg_user">
  <input type="password" placeholder="密码" id="reg_pwd">
  <input type="password" placeholder="确认密码" id="reg_pwd2">
  <input placeholder="邮箱" id="reg_email">
  <input placeholder="确认邮箱" id="reg_email2">
  <button onclick="register()">注册</button>
</div>

<!-- ====================== 找回密码 ====================== -->
<div class="page" id="forgot">
  <input placeholder="用户名" id="fg_user">
  <input placeholder="邮箱" id="fg_email">
  <button onclick="forgot()">下一步（验证）</button>
  <a onclick="showPage('login')">返回登录</a>
</div>

<!-- ====================== 重置密码 ====================== -->
<div class="page" id="reset">
  <input disabled placeholder="用户名" id="reset_user">
  <input type="password" placeholder="新密码" id="reset_pwd">
  <input type="password" placeholder="确认新密码" id="reset_pwd2">
  <button onclick="resetPassword()">重置密码</button>
  <a onclick="showPage('login')">返回登录</a>
</div>

<div id="msg"></div>
</div>

<script>
  let currentUsername = "";

  // 切换页面
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tbtn').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    setMsg("");
  }

  document.querySelectorAll('.tbtn').forEach(t => {
    t.onclick = () => showPage(t.dataset.page);
  });

  function setMsg(text, ok=false) {
    const m = document.getElementById('msg');
    m.innerText = text;
    m.className = ok ? "ok" : "err";
  }

  // ==================================
  // 登录
  // ==================================
  async function login() {
  const username = document.getElementById('login_user').value;
  const password = document.getElementById('login_pwd').value;
  const res = await fetch('/api/login', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ username, password })
  });
  const d = await res.json();
  setMsg(d.msg, d.ok);
  
  if (d.ok) {
    localStorage.setItem("loginUser", username); // 保存登录
    setTimeout(() => location.href = "/home.html", 800);
  }
}

  // ==================================
  // 注册
  // ==================================
  async function register() {
    const username = document.getElementById('reg_user').value;
    const password = document.getElementById('reg_pwd').value;
    const confirmPassword = document.getElementById('reg_pwd2').value;
    const email = document.getElementById('reg_email').value;
    const confirmEmail = document.getElementById('reg_email2').value;

    const res = await fetch('/api/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, password, confirmPassword, email, confirmEmail })
    });
    const d = await res.json();
    setMsg(d.msg, d.ok);
    if (d.ok) {
      setTimeout(() => showPage('login'), 800);
    }
  }

  // ==================================
  // 忘记密码（验证用户名+邮箱）
  // ==================================
  async function forgot() {
    const username = document.getElementById('fg_user').value;
    const email = document.getElementById('fg_email').value;
    const res = await fetch('/api/forgot', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username, email })
    });
    const d = await res.json();
    setMsg(d.msg, d.ok);
    if (d.ok) {
      currentUsername = username;
      document.getElementById('reset_user').value = username;
      setTimeout(()=>showPage('reset'),800);
    }
  }

  // ==================================
  // 重置密码
  // ==================================
  async function resetPassword() {
    const newPassword = document.getElementById('reset_pwd').value;
    const confirmPassword = document.getElementById('reset_pwd2').value;
    const res = await fetch('/api/reset', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: currentUsername, newPassword, confirmPassword })
    });
    const d = await res.json();
    setMsg(d.msg, d.ok);
    if (d.ok) setTimeout(()=>showPage('login'),1000);
  }

  // ==================================
  // 游客
  // ==================================
  async function guest() {
  const r = await fetch('/api/guest');
  const d = await r.json();
  setMsg(d.msg, true);
  setTimeout(()=>location.href="/home.html",800);
}
</script>
</body>
</html>
