<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>测试 D1</title>
</head>
<body>
<h1>测试数据库 test 表</h1>

<input id="test1" placeholder="test1 (文本)"><br>
<input id="test2" type="number" placeholder="test2 (数字)"><br>
<button onclick="add()">添加</button>
<button onclick="get()">查询所有</button>

<pre id="res"></pre>

<script>
async function add() {
  const test1 = document.getElementById('test1').value;
  const test2 = document.getElementById('test2').value;

  const res = await fetch('/api/users', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ test1, test2 })
  });

  const data = await res.json();
  document.getElementById('res').textContent = JSON.stringify(data, null, 2);
}

async function get() {
  const res = await fetch('/api/users');
  const data = await res.json();
  document.getElementById('res').textContent = JSON.stringify(data, null, 2);
}
</script>
</body>
</html>
